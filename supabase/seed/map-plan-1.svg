<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="Nunito, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="20" font-weight="800" fill="#3f2682">Greenfield Community College — Ground Floor Plan</text>

  <!-- building outline -->
  <rect x="25" y="48" width="710" height="386" rx="10" fill="#f8f7fc" stroke="#4b3f66" stroke-width="3"/>

  <!-- horizontal corridor band -->
  <rect x="28" y="212" width="704" height="58" fill="#efeafd"/>
  <text x="380" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#6b6382" letter-spacing="2">CORRIDOR</text>

  <!-- room dividers (top row) -->
  <line x1="205" y1="51" x2="205" y2="212" stroke="#b9aee0" stroke-width="2"/>
  <line x1="380" y1="51" x2="380" y2="212" stroke="#b9aee0" stroke-width="2"/>
  <line x1="555" y1="51" x2="555" y2="212" stroke="#b9aee0" stroke-width="2"/>
  <!-- room dividers (bottom row) -->
  <line x1="205" y1="270" x2="205" y2="431" stroke="#b9aee0" stroke-width="2"/>
  <line x1="380" y1="270" x2="380" y2="431" stroke="#b9aee0" stroke-width="2"/>
  <line x1="555" y1="270" x2="555" y2="431" stroke="#b9aee0" stroke-width="2"/>

  <!-- lettered markers -->
  <!-- top row: A(115,130) B(292,130) C(467,130) D(645,130) -->
  <g font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">
    <circle cx="115" cy="130" r="26" fill="#3f2682"/><text x="115" y="138">A</text>
    <circle cx="292" cy="130" r="26" fill="#3f2682"/><text x="292" y="138">B</text>
    <circle cx="467" cy="130" r="26" fill="#3f2682"/><text x="467" y="138">C</text>
    <circle cx="645" cy="130" r="26" fill="#3f2682"/><text x="645" y="138">D</text>
    <!-- bottom row: E F G H -->
    <circle cx="115" cy="350" r="26" fill="#3f2682"/><text x="115" y="358">E</text>
    <circle cx="292" cy="350" r="26" fill="#3f2682"/><text x="292" y="358">F</text>
    <circle cx="467" cy="350" r="26" fill="#3f2682"/><text x="467" y="358">G</text>
    <circle cx="645" cy="350" r="26" fill="#3f2682"/><text x="645" y="358">H</text>
  </g>

  <!-- entrance -->
  <rect x="345" y="431" width="70" height="14" fill="#ffffff" stroke="#4b3f66" stroke-width="3"/>
  <path d="M380 470 L380 448 M372 458 L380 448 L388 458" stroke="#8b5cf6" stroke-width="3" fill="none"/>
  <text x="425" y="462" font-size="13" font-weight="700" fill="#6b6382">Entrance</text>

  <!-- compass -->
  <g transform="translate(700,80)">
    <circle r="18" fill="#ffffff" stroke="#b9aee0" stroke-width="2"/>
    <path d="M0 -12 L5 4 L0 0 L-5 4 Z" fill="#3f2682"/>
    <text x="0" y="-20" text-anchor="middle" font-size="11" font-weight="800" fill="#6b6382">N</text>
  </g>
</svg>
